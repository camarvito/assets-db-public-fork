services:
  postgres:
    image: postgres:16-alpine
    container_name: assets-db-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: assets
      POSTGRES_PASSWORD: assets
      POSTGRES_DB: assets_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assets -d assets_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
